<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LootXhub</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f1a;
            color: white;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .logo {
            font-size: 48px;
            font-weight: bold;
            color: #00bfff;
            text-shadow: 0 0 15px rgba(0,191,255,0.8);
        }

        .tagline {
            margin-top: 10px;
            font-size: 18px;
            color: #aaa;
        }

        .contact {
            margin-top: 30px;
            font-size: 16px;
        }

        .contact a {
            color: #00bfff;
            text-decoration: none;
        }

        .contact a:hover {
            text-decoration: underline;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">LootXhub</div>
        <div class="tagline">Roblox Item Marketplace</div>

        <div class="contact">
            Contact: <a href="mailto:davyn267@gmail.com">davyn267@gmail.com</a>
        </div>
    </div>

    <footer>
        © 2026 LootXhub. All rights reserved.
    </footer>

</body>
</html>
